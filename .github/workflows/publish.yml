name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build x86_64 (Intel)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build x86_64
        run: |
          swift build -c release --arch x86_64 --disable-sandbox
          echo "BIN_PATH=$(swift build -c release --arch x86_64 --show-bin-path 2>/dev/null)" >> "$GITHUB_ENV"

      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="GreenRAM.app"
          mkdir -p "$BUNDLE_DIR/Contents/MacOS"
          mkdir -p "$BUNDLE_DIR/Contents/Resources"

          cp "$BIN_PATH/GreenRAM" "$BUNDLE_DIR/Contents/MacOS/GreenRAM"
          cp Packaging/GreenRAM.icns "$BUNDLE_DIR/Contents/Resources/"
          cp Packaging/GreenRAM-Info.plist "$BUNDLE_DIR/Contents/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$BUNDLE_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$BUNDLE_DIR/Contents/Info.plist"

          codesign --force --deep --sign - "$BUNDLE_DIR"

      - name: Package .app.zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="GreenRAM-${VERSION}.app.zip"
          ditto -c -k --keepParent "GreenRAM.app" "$ZIP_NAME"
          echo "artifact_name=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenRAM-${{ github.ref_name }}
          path: GreenRAM-*.app.zip
